{% extends "base.html" %}

{% block content %}
  <h1>
    Tag List
    <a href="{% url 'tag-create' %}" class="btn btn-primary">Create</a>
  </h1>

  <table>
    <tr>
      <th>Name</th>
      <th>Update</th>
      <th>Delete</th>
    </tr>

    {% for tag in tag_list %}
      <tr>
        <td>{{ tag.name }}</td>
        <td>
          <a href="{% url 'tag-update' pk=tag.pk %}" class="btn btn-warning btn-sm">Update</a>
        </td>
        <td>
          <a href="{% url 'tag-delete' pk=tag.pk %}" class="btn btn-danger btn-sm">Delete</a>
        </td>
      </tr>
    {% empty %}
      <tr>
        <td>No tags yet.</td>
      </tr>
    {% endfor %}
  </table>
{% endblock %}
